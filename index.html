<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PGDD</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><rect width='100%25' height='100%25' fill='%230000FF'/></svg>">

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Segoe UI;background:#121212;color:#eee;}
header{background:#0000FF;padding:20px;text-align:center;color:white;}
#user-title{font-size:2.3em;text-align:center;margin:20px 0;font-weight:bold;}

h1 {
  font-size: 7rem; /* más grande que el tamaño predeterminado */
}

#changelog{
position:fixed;top:10px;left:10px;font-size:0.8em;
background:#222;padding:10px;border-radius:8px;max-width:250px;
}

#info-icon{
position:fixed;top:10px;right:10px;background:#333;border-radius:50%;
width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#info-icon:hover::after{
content:"Data is stored locally. Clearing browser data will erase everything.";
position:absolute;top:40px;right:0;background:#222;padding:8px;border-radius:6px;
width:220px;font-size:0.8em;
}

#list{max-width:950px;margin:auto;padding:10px;}
.level{
display:flex;gap:15px;background:#1e1e1e;padding:16px;margin-bottom:12px;
border:1px solid #444;border-radius:12px;align-items:center;cursor:grab;
}
.level.dragging{opacity:0.5;}
.pos{font-size:2em;width:60px;text-align:center;font-weight:bold;}
.thumb{height:110px;border-radius:8px;}
.info{flex:1;font-size:1.1em;}
.actions{display:flex;gap:6px;}

.btn{background:#333;color:white;border:none;padding:8px 10px;border-radius:6px;cursor:pointer;}
.btn:hover{background:#555;}

#empty{text-align:center;opacity:0.6;margin-top:30px;}

.floating{
position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;
}
.circle{
width:60px;height:60px;border-radius:50%;border:none;background:#0000FF;color:white;
font-size:26px;cursor:pointer;
}
.circle:hover{background:#1a1aff;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;}
.modal.show{display:flex;}
.box{background:#1f1f1f;padding:20px;border-radius:10px;width:90%;max-width:420px;}

input,select,textarea{
width:100%;margin-top:8px;padding:8px;background:#2a2a2a;border:1px solid #444;color:white;border-radius:6px;
}
textarea{height:60px;}

.row{display:flex;justify-content:space-between;margin-top:15px;}
.primary{background:#0000FF;}
.danger{background:#aa2222;}
</style>
</head>

<body>

<header>
<h1>PGDD</h1>   
<p>Personal Geometry Dash Demonlist</p>
</header>

<div id="changelog">
Changelog: <br>
1.0 - Initial Release <br>
1.1 - Level Thumbnails API Added
</div>

<div id="info-icon">i</div>
<div id="user-title"></div>

<ul id="list"></ul>
<div id="empty">No submissions here. Submit a record for it to appear here :)</div>

<div class="floating">
<button class="circle" onclick="openForm()">+</button>
<button class="circle" onclick="exportMsg()">⤴</button>
</div>

<!-- USER -->
<div class="modal" id="userModal">
<div class="box">
<h3>Enter username</h3>
<input id="usernameInput">
<button class="btn primary" onclick="setUser()">Continue</button>
</div>
</div>

<!-- FORM -->
<div class="modal" id="formModal">
<div class="box">
<h2>Submit a Record</h2>

<input id="name" placeholder="Name *">
<input id="creator" placeholder="Creator *">
<input id="position" type="number" placeholder="List position *">
<input id="levelid" placeholder="Level ID *">

<select id="imgmode">
<option value="id">Use Level Thumbnail API</option>
<option value="upload">Upload image</option>
</select>

<input type="file" id="file" accept=".jpg,.png">

<textarea id="desc" placeholder="Description"></textarea>
<input id="attempts" type="number" placeholder="Attempts">
<input id="enjoyment" type="number" min="1" max="10" placeholder="Enjoyment (1-10)">

<select id="difficulty">
<option>Easy Demon</option>
<option>Medium Demon</option>
<option>Hard Demon</option>
<option>Insane Demon</option>
<option selected>Extreme Demon</option>
</select>

<select id="type">
<option>Classic</option>
<option>Platformer</option>
</select>

<div class="row">
<button class="btn" onclick="closeForm()">Cancel</button>
<button class="btn primary" onclick="submitLevel()">Submit</button>
</div>

</div>
</div>

<!-- INFO MODAL -->
<div class="modal" id="infoModal">
<div class="box" id="infoBox"></div>
</div>

<script>
// USER
let username=localStorage.getItem("username");
if(!username){document.getElementById("userModal").classList.add("show");}

function setUser(){
let v=document.getElementById("usernameInput").value.trim();
if(!v){alert("Username required");return;}
username=v;
localStorage.setItem("username",v);
document.getElementById("userModal").classList.remove("show");
updateTitle();
}
function updateTitle(){
document.getElementById("user-title").textContent=username+"'s Demonlist";
}
updateTitle();

// STORAGE
let levels=JSON.parse(localStorage.getItem("levels")||"[]");
let editIndex=null;

// IMAGE MODE
const fileInput = document.getElementById("file");
const imgMode = document.getElementById("imgmode");
fileInput.style.display = "none";

imgMode.addEventListener("change", ()=>{
fileInput.style.display = imgMode.value==="upload"?"block":"none";
});

// RESET FORM
function resetForm(){
document.getElementById("name").value="";
document.getElementById("creator").value="";
document.getElementById("position").value="";
document.getElementById("levelid").value="";
document.getElementById("desc").value="";
document.getElementById("attempts").value="";
document.getElementById("enjoyment").value="";
document.getElementById("difficulty").value="Extreme Demon";
document.getElementById("type").value="Classic";
imgMode.value="id";
fileInput.value="";
fileInput.style.display="none";
}

// FORM
function openForm(){
editIndex=null;
resetForm();
document.getElementById("formModal").classList.add("show");
}
function closeForm(){
document.getElementById("formModal").classList.remove("show");
}

// SUBMIT
function submitLevel(){
const name=document.getElementById("name").value.trim();
const creator=document.getElementById("creator").value.trim();
const pos=parseInt(document.getElementById("position").value);
const id=document.getElementById("levelid").value.trim();
const desc=document.getElementById("desc").value;
const attempts=parseInt(document.getElementById("attempts").value)||0;
const enjoyment=parseInt(document.getElementById("enjoyment").value)||1;
const difficulty=document.getElementById("difficulty").value;
const type=document.getElementById("type").value;

if(!name||!creator||!pos||!id){alert("Fill required fields");return;}
if(enjoyment<1||enjoyment>10){alert("Enjoyment must be 1-10");return;}

function save(thumb){
const obj={name,creator,id,thumb,desc,attempts,enjoyment,difficulty,type};

if(editIndex!==null){
levels[editIndex]=obj;
}else{
levels.splice(pos-1,0,obj);
}

localStorage.setItem("levels",JSON.stringify(levels));
render();
}

if(imgMode.value==="upload" && fileInput.files[0]){
const r=new FileReader();
r.onload=e=>save(e.target.result);
r.readAsDataURL(fileInput.files[0]);
}else{
save(`https://levelthumbs.prevter.me/thumbnail/${id}`);
}

closeForm();
resetForm();
}

// RENDER
function render(){
const list=document.getElementById("list");
list.innerHTML="";
document.getElementById("empty").style.display=levels.length?"none":"block";

levels.forEach((l,i)=>{
const li=document.createElement("li");
li.className="level";
li.draggable=true;
li.dataset.index=i;

li.innerHTML=`
<div class="pos">#${i+1}</div>
<img class="thumb" src="${l.thumb}">
<div class="info">
<b>${l.name}</b><br>${l.creator}<br>${l.type}
</div>
<div class="actions">
<button class="btn" onclick="openInfo(${i})">i</button>
</div>
`;

li.addEventListener("dragstart",()=>{li.classList.add("dragging");});
li.addEventListener("dragend",()=>{li.classList.remove("dragging");updateOrder();});

list.appendChild(li);
});
}
render();

// DRAG & DROP
const list=document.getElementById("list");

list.addEventListener("dragover",(e)=>{
e.preventDefault();
const dragging=document.querySelector(".dragging");
const after=getAfter(e.clientY);
if(!dragging) return;
if(after==null){list.appendChild(dragging);}
else{list.insertBefore(dragging,after);}
});

function getAfter(y){
const els=[...document.querySelectorAll(".level:not(.dragging)")];
return els.reduce((closest,child)=>{
const box=child.getBoundingClientRect();
const offset=y-box.top-box.height/2;
if(offset<0 && offset>closest.offset){return {offset,element:child};}else{return closest;}
},{offset:Number.NEGATIVE_INFINITY}).element;
}

function updateOrder(){
const items=[...document.querySelectorAll(".level")];
levels=items.map(el=>levels[el.dataset.index]);
localStorage.setItem("levels",JSON.stringify(levels));
render();
}

// INFO MODAL
function openInfo(i){
const l=levels[i];
document.getElementById("infoBox").innerHTML=`
<h3>${l.name}</h3>
<p>ID: ${l.id}</p>
<p>Description: ${l.desc}</p>
<p>Attempts: ${l.attempts}</p>
<p>Enjoyment: ${l.enjoyment}</p>
<p>Difficulty: ${l.difficulty}</p>
<p>Type: ${l.type}</p>
<div class="row">
<button class="btn" onclick="closeInfo()">OK</button>
<button class="btn primary" onclick="edit(${i})">Edit Info</button>
<button class="btn danger" onclick="del(${i})">Delete Record</button>
</div>
`;
document.getElementById("infoModal").classList.add("show");
}

function closeInfo(){document.getElementById("infoModal").classList.remove("show");}

// EDIT
function edit(i){
const l=levels[i];
editIndex=i;

document.getElementById("name").value=l.name;
document.getElementById("creator").value=l.creator;
document.getElementById("position").value=i+1;
document.getElementById("levelid").value=l.id;
document.getElementById("desc").value=l.desc;
document.getElementById("attempts").value=l.attempts;
document.getElementById("enjoyment").value=l.enjoyment;
document.getElementById("difficulty").value=l.difficulty;
document.getElementById("type").value=l.type;

closeInfo();
document.getElementById("formModal").classList.add("show");
}

// DELETE
function del(i){
if(confirm("This action is irreversible. Continue?")){
levels.splice(i,1);
localStorage.setItem("levels",JSON.stringify(levels));
render();
closeInfo();
}
}

// EXPORT
function exportMsg(){
alert("Export feature is in the works, for now you can just screenshot.");
}
</script>

</body>
</html>
